      'Saudi Arabia','Malaysia','Thailand','Vietnam','Indonesia','Turkey','South Africa','Kenya',

    const INDIAN_STATES = [

      'Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra',

    const PAGE_SIZE = 50;
    const EXPORT_HEADERS = ['Vendor Name','Designation','Company','Vendor Type','Country','State','City','Location','Area Performing','Mobile','WhatsApp','Email','Website','GST','IEC','PAN','Tags','Notes'];
    const EXPORT_KEYS    = ['name','designation','company','vendorType','country','state','city','location','areaPerforming','mobile','whatsapp','email','website','gst','iec','pan','tags','notes'];

    // ═══════════════════════════════════════════════════════════════════
    // CONTEXTS
    // ═══════════════════════════════════════════════════════════════════
    const AuthContext     = createContext({ user: null, role: 'viewer', onLogout: () => {} });
    const BrandingContext = createContext({ appTitle:'Vendor Management', logoUrl:'', faviconUrl:'', contactEmail:'' });
    const ToastContext    = createContext({ toast: () => {} });

    // ═══════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════
    function generateSearchTerms(data) {
      const fields = [data.name, data.company, data.email, data.mobile, data.country, data.state, data.city, data.location, data.areaPerforming, ...(data.vendorType||[]), ...(data.tags||[])];
      const terms = new Set();
      fields.forEach(f => {
        if (!f) return;
        const lower = f.toLowerCase().trim();
        if (lower.length >= 2) terms.add(lower);
        lower.split(/[\s,.\-]+/).forEach(w => { if (w.length >= 2) terms.add(w); });
      });
      if (data.name) { const n = data.name.toLowerCase().trim(); for (let i=2;i<=Math.min(n.length,10);i++) terms.add(n.slice(0,i)); }
      return [...terms].slice(0, 50);
    }
    function getInitials(name) {
      if (!name) return 'VN';
      const p = name.trim().split(/\s+/);
      return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
    }
    function whatsappUrl(num) { return num ? 'https://wa.me/'+num.replace(/\D/g,'') : ''; }
    function validateEmail(e) { return !e || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function validatePhone(p) { return !p || /^\+?[\d\s\-]{7,15}$/.test(p); }
    function validateGST(g)   { return !g || /^\d{2}[A-Z]{5}\d{4}[A-Z][A-Z\d]Z[A-Z\d]$/.test(g.toUpperCase()); }
    function validatePAN(p)   { return !p || /^[A-Z]{5}\d{4}[A-Z]$/.test(p.toUpperCase()); }
    function validateIEC(i)   { return !i || /^\d{10}$/.test(i); }
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea'); ta.value = text;
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════════════════════════════
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const toast = useCallback((msg, type='info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      }, []);
      return (
        <ToastContext.Provider value={{ toast }}>
          {children}
          <div className="fixed bottom-4 right-4 z-[100] space-y-1.5 w-72 max-w-[calc(100vw-2rem)]">
            {toasts.map(t => (
              <div key={t.id} className={`fade-in px-3 py-2 rounded shadow-lg text-xs ${
                t.type==='error' ? 'bg-red-600 text-white' : t.type==='success' ? 'bg-green-600 text-white' : 'bg-gray-800 text-white'
              }`}>{t.msg}</div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // ERROR SCREEN — shown when Firebase config fetch fails
    // ═══════════════════════════════════════════════════════════════════
    function ErrorScreen({ error }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-white px-6 text-center">
          <div className="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center mx-auto mb-4">
            <Icon name="wifiOff" size={24} className="text-danger" />
          </div>
          <h1 className="text-lg font-bold text-foreground mb-1">Cannot Connect to Firebase</h1>
          <p className="text-xs text-muted mb-4 max-w-sm">
            The app could not load its configuration. Ensure Firebase environment variables are set in
            the Vercel Dashboard under Settings → Environment Variables, then redeploy.
          </p>
          <div className="text-2xs font-mono bg-red-50 text-danger px-3 py-2 rounded border border-red-200 max-w-sm break-all">
            {error}
          </div>
          <button onClick={() => window.location.reload()}
            className="mt-4 px-4 h-8 text-xs bg-accent text-white rounded hover:bg-blue-700">
            Retry
          </button>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ═══════════════════════════════════════════════════════════════════
    function LoginScreen({ onLogin, branding }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        await new Promise(r => setTimeout(r, 350));
        if (pin === '9965') {
          onLogin({ uid:'local-admin', email: branding.contactEmail||'admin@vendor', displayName:'Admin', role:'admin' });
        } else {
          setError('Invalid PIN. Please try again.');
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-white px-4">
          <form onSubmit={handleSubmit} className="w-full max-w-[280px] space-y-4 text-center">
            <div className="mb-2">
              {branding.logoUrl ? (
                <img src={branding.logoUrl} alt="Logo" className="h-10 w-auto mx-auto mb-3 object-contain" />
              ) : (
                <div className="w-10 h-10 rounded-lg bg-accent-light flex items-center justify-center mx-auto mb-3">
                  <Icon name="shield" size={20} className="text-accent" />
                </div>
              )}
              <h1 className="text-lg font-bold text-foreground">{branding.appTitle||'Vendor Management'}</h1>
              <p className="text-2xs text-muted mt-0.5">Enter PIN to access the system</p>
            </div>

            {error && (
              <div className="flex items-center gap-1.5 px-2.5 py-1.5 bg-red-50 border border-red-200 rounded text-2xs text-danger justify-center">
                <Icon name="alertTriangle" size={12} />{error}
              </div>
            )}

            <input type="password" maxLength={6} value={pin}
              onChange={e => setPin(e.target.value.replace(/\D/g,''))} placeholder="••••"
              className="w-full text-center tracking-[1em] text-lg font-bold px-3 py-1.5 border border-border rounded focus:ring-1 focus:ring-accent h-10"
              autoFocus />

            <button type="submit" disabled={loading}
              className="w-full h-8 bg-accent text-white text-xs font-medium rounded hover:bg-blue-700 transition-colors disabled:opacity-60 flex items-center justify-center gap-1">
              {loading && <Icon name="loader" size={12} className="animate-spin" />}
              {loading ? 'Verifying...' : 'Access System'}
            </button>
          </form>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // VENDOR FORM DRAWER
    // ═══════════════════════════════════════════════════════════════════
    function VendorFormDrawer({ isOpen, onClose, editVendor, onSave }) {
      const def = { name:'',designation:'',company:'',vendorType:[],country:'',state:'',city:'',location:'',areaPerforming:'',mobile:'',whatsapp:'',email:'',website:'',gst:'',iec:'',pan:'',tags:[],notes:'',isFavorite:false };
      const [form, setForm] = useState(def);
      const [errors, setErrors] = useState({});
      const [saving, setSaving] = useState(false);
      const [tagInput, setTagInput] = useState('');

      useEffect(() => {
        setForm(editVendor ? { ...def, ...editVendor, vendorType: editVendor.vendorType||[] } : def);
        setErrors({}); setTagInput('');
      }, [editVendor, isOpen]);

      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const toggleType = (type) => setForm(f=>({...f,vendorType:f.vendorType.includes(type)?f.vendorType.filter(t=>t!==type):[...f.vendorType,type]}));
      const addTag = () => { const t=tagInput.trim(); if(t&&!form.tags.includes(t)){set('tags',[...form.tags,t]);setTagInput('');} };

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name='Name is required';
        if (form.vendorType.length===0) e.vendorType='Select at least one type';
        if (!validateEmail(form.email)) e.email='Invalid email';
        if (!validatePhone(form.mobile)) e.mobile='Invalid phone';
        if (!validatePhone(form.whatsapp)) e.whatsapp='Invalid number';
        if (!validateGST(form.gst)) e.gst='Invalid GST';
        if (!validatePAN(form.pan)) e.pan='Invalid PAN';
        if (!validateIEC(form.iec)) e.iec='IEC must be 10 digits';
        setErrors(e);
        return Object.keys(e).length===0;
      };

      const handleSave = async () => {
        if (!validate()) return;
        setSaving(true);
        try { await onSave(form, editVendor?.id); onClose(); }
        catch(err) { setErrors({_form:err.message}); }
        finally { setSaving(false); }
      };

      if (!isOpen) return null;

      const Field = ({label,field,type='text',required,half}) => (
        <div className={half?'flex-1':''}>
          <label className="text-2xs font-medium text-muted block mb-0.5">{label}{required&&' *'}</label>
          <input type={type} value={form[field]||''} onChange={e=>set(field,e.target.value)} placeholder={label}
            className={`w-full px-2 py-1 text-xs border rounded h-7 focus:ring-1 focus:ring-accent focus:border-accent ${errors[field]?'border-danger':'border-border'}`} />
          {errors[field]&&<span className="text-2xs text-danger">{errors[field]}</span>}
        </div>
      );
      const Sel = ({label,field,options,placeholder}) => (
        <div className="flex-1">
          <label className="text-2xs font-medium text-muted block mb-0.5">{label}</label>
          <select value={form[field]||''} onChange={e=>set(field,e.target.value)}
            className="w-full px-2 py-1 text-xs border border-border rounded h-7 focus:ring-1 focus:ring-accent appearance-none bg-white cursor-pointer">
            <option value="">{placeholder||'Select...'}</option>
            {options.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      );

      const Divider = ({label}) => <div className="text-2xs font-semibold text-muted uppercase tracking-wider pt-1 pb-0.5 border-b border-border">{label}</div>;

      return (
        <>
          <div className="fixed inset-0 bg-black/20 z-40" onClick={onClose} />
          <div className="fixed top-0 right-0 h-full w-full sm:w-[460px] bg-white shadow-xl z-50 flex flex-col slide-right">
            <div className="flex items-center justify-between px-4 py-2.5 border-b border-border">
              <h2 className="text-sm font-semibold">{editVendor?'Edit Vendor':'Add Vendor'}</h2>
              <button onClick={onClose} className="p-1 rounded hover:bg-hover-bg text-muted"><Icon name="x" size={16}/></button>
            </div>
            <div className="flex-1 overflow-y-auto px-4 py-3 space-y-2.5">
              {errors._form && <div className="text-2xs text-danger bg-red-50 px-2 py-1 rounded">{errors._form}</div>}
              <Divider label="Basic Info" />
              <Field label="Vendor Name" field="name" required />
              <Field label="Designation" field="designation" />
              <Field label="Company" field="company" />
              <div>
                <label className="text-2xs font-medium text-muted block mb-0.5">Vendor Type *</label>
                <div className="flex flex-wrap gap-1">
                  {VENDOR_TYPES.map(type=>(
                    <button key={type} type="button" onClick={()=>toggleType(type)}
                      className={`px-2 py-0.5 text-2xs rounded border transition-colors ${form.vendorType.includes(type)?'bg-accent text-white border-accent':'bg-white text-muted border-border hover:bg-hover-bg'}`}>
                      {type}
                    </button>
                  ))}
                </div>
                {errors.vendorType&&<span className="text-2xs text-danger">{errors.vendorType}</span>}
              </div>
              <Divider label="Location" />
              <div className="flex gap-2"><Sel label="Country" field="country" options={COUNTRIES} placeholder="Country"/><Sel label="State" field="state" options={INDIAN_STATES} placeholder="State"/></div>
              <div className="flex gap-2"><Field label="City" field="city" half/><Field label="Location" field="location" half/></div>
              <Field label="Area Performing" field="areaPerforming" />
              <Divider label="Contact" />
              <div className="flex gap-2"><Field label="Mobile" field="mobile" half/><Field label="WhatsApp" field="whatsapp" half/></div>
              {form.whatsapp&&<p className="text-2xs text-muted">WA: <a href={whatsappUrl(form.whatsapp)} target="_blank" className="text-accent hover:underline">{whatsappUrl(form.whatsapp)}</a></p>}
              <Field label="Email" field="email" type="email"/>
              <Field label="Website" field="website"/>
              <Divider label="Compliance" />
              <div className="flex gap-2"><Field label="GST" field="gst" half/><Field label="PAN" field="pan" half/></div>
              <Field label="IEC" field="iec"/>
              <Divider label="Additional" />
              <div>
                <label className="text-2xs font-medium text-muted block mb-0.5">Notes</label>
                <textarea value={form.notes||''} onChange={e=>set('notes',e.target.value)} rows={2} placeholder="Notes..."
                  className="w-full px-2 py-1 text-xs border border-border rounded resize-y focus:ring-1 focus:ring-accent min-h-[42px]" />
              </div>
              <div>
                <label className="text-2xs font-medium text-muted block mb-0.5">Tags</label>
                <div className="flex gap-1 mb-1">
                  <input value={tagInput} onChange={e=>setTagInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addTag();}}}
                    placeholder="Add tag + Enter" className="flex-1 px-2 py-1 text-xs border border-border rounded h-7 focus:ring-1 focus:ring-accent" />
                  <button type="button" onClick={addTag} className="px-2 h-7 text-xs border border-border rounded hover:bg-hover-bg">Add</button>
                </div>
                {form.tags.length>0&&(
                  <div className="flex flex-wrap gap-1">
                    {form.tags.map(tag=>(
                      <span key={tag} className="inline-flex items-center gap-0.5 px-1.5 py-0.5 text-2xs bg-accent-light text-accent rounded">
                        {tag}<button onClick={()=>set('tags',form.tags.filter(t=>t!==tag))}><Icon name="x" size={8}/></button>
                      </span>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div className="flex items-center justify-end gap-2 px-4 py-2.5 border-t border-border">
              <button onClick={onClose} className="px-3 h-7 text-xs border border-border rounded hover:bg-hover-bg">Cancel</button>
              <button onClick={handleSave} disabled={saving}
                className="px-3 h-7 text-xs bg-accent text-white rounded hover:bg-blue-700 disabled:opacity-50 flex items-center gap-1">
                {saving&&<Icon name="loader" size={10} className="animate-spin"/>}
                {editVendor?'Update':'Save'}
              </button>
            </div>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // IMPORT MODAL
    // ═══════════════════════════════════════════════════════════════════
    function ImportModal({ isOpen, onClose, onImport }) {
      const [step, setStep] = useState('upload');
      const [rows, setRows] = useState([]);
      const [progress, setProgress] = useState(0);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      useEffect(()=>{ if(isOpen){setStep('upload');setRows([]);setError('');setResult(null);} },[isOpen]);

      const handleFile = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const data = await file.arrayBuffer();
          const wb = XLSX.read(data,{type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
          if(!json.length){setError('File has no data rows');return;}
          const validated = json.map((row,i)=>{
            const d={};
            Object.entries(row).forEach(([k,v])=>{
              const km={'vendor name':'name','vendor_name':'name','company name':'company','vendor type':'vendorType','vendor_type':'vendorType','area performing':'areaPerforming','area_performing':'areaPerforming','mobile number':'mobile','whatsapp number':'whatsapp','email address':'email','gst number':'gst','iec number':'iec','pan number':'pan'};
              d[km[k.toLowerCase().trim()]||k.toLowerCase().trim()]=String(v||'').trim();
            });
            const errs=[];
            if(!d.name) errs.push('Name required');
            if(!d.vendortype&&!d.vendorType) errs.push('Type required');
            return {idx:i,data:d,errors:errs,valid:errs.length===0};
          });
          setRows(validated); setStep('preview');
        } catch(err){setError('Failed to parse: '+err.message);}
      };

      const handleImport = async () => {
        setStep('importing');
        const valid=rows.filter(r=>r.valid); let success=0,fail=0;
        for(let i=0;i<valid.length;i+=500){
          const chunk=valid.slice(i,i+500);
          try{await onImport(chunk.map(r=>r.data));success+=chunk.length;}
          catch{fail+=chunk.length;}
          setProgress(Math.min(i+500,valid.length));
        }
        setResult({success,fail}); setStep('complete');
      };

      const downloadTemplate = () => {
        const ws=XLSX.utils.aoa_to_sheet([EXPORT_HEADERS,['John Smith','Manager','ABC Logistics','Freight Forwarding, CHA','India','Maharashtra','Mumbai','Andheri','Western India','+91 98765 43210','+91 98765 43210','john@abc.com','https://abc.com','27AAAAA0000A1Z5','0123456789','ABCDE1234F','freight, import','Key contact']]);
        const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Vendors'); XLSX.writeFile(wb,'vendor_template.xlsx');
      };

      if(!isOpen) return null;
      const validCount=rows.filter(r=>r.valid).length;

      return (
        <>
          <div className="fixed inset-0 bg-black/20 z-40" onClick={onClose}/>
          <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
            <div className="bg-white rounded-t-2xl sm:rounded-lg shadow-xl w-full sm:max-w-3xl max-h-[90vh] sm:max-h-[80vh] flex flex-col fade-in">
              <div className="flex items-center justify-between px-4 py-2.5 border-b border-border">
                <h2 className="text-sm font-semibold">Import Vendors</h2>
                <button onClick={onClose} className="p-1 rounded hover:bg-hover-bg text-muted"><Icon name="x" size={16}/></button>
              </div>
              <div className="flex-1 overflow-y-auto p-4">
                {step==='upload'&&(
                  <div className="text-center py-6 space-y-3">
                    <Icon name="fileSpreadsheet" size={36} className="text-muted mx-auto"/>
                    <div><p className="text-sm font-medium">Upload Excel or CSV</p><p className="text-2xs text-muted">.csv, .xls, .xlsx</p></div>
                    {error&&<p className="text-2xs text-danger">{error}</p>}
                    <div className="flex justify-center gap-2">
                      <label className="cursor-pointer px-3 py-1.5 text-xs bg-accent text-white rounded hover:bg-blue-700 inline-flex items-center gap-1">
                        <Icon name="upload" size={12}/> Choose File
                        <input type="file" accept=".csv,.xls,.xlsx" className="hidden" onChange={handleFile}/>
                      </label>
                      <button onClick={downloadTemplate} className="px-3 py-1.5 text-xs border border-border rounded hover:bg-hover-bg inline-flex items-center gap-1">
                        <Icon name="download" size={12}/> Template
                      </button>
                    </div>
                  </div>
                )}
                {step==='preview'&&(
                  <div className="space-y-2">
                    <div className="flex gap-2 text-2xs">
                      <span className="px-1.5 py-0.5 bg-gray-100 rounded">{rows.length} rows</span>
                      <span className="px-1.5 py-0.5 bg-green-50 text-green-700 rounded">{validCount} valid</span>
                      {rows.length-validCount>0&&<span className="px-1.5 py-0.5 bg-red-50 text-red-700 rounded">{rows.length-validCount} errors</span>}
                    </div>
                    <div className="border border-border rounded overflow-auto max-h-[300px]">
                      <table className="w-full text-2xs">
                        <thead className="sticky top-0 bg-gray-50"><tr>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">#</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">Name</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border hidden sm:table-cell">Company</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border hidden sm:table-cell">Type</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">Status</th>
                        </tr></thead>
                        <tbody>
                          {rows.slice(0,100).map(r=>(
                            <tr key={r.idx} className={r.valid?'':'bg-red-50'}>
                              <td className="px-2 py-1 border-b border-border">{r.idx+1}</td>
                              <td className="px-2 py-1 border-b border-border">{r.data.name}</td>
                              <td className="px-2 py-1 border-b border-border hidden sm:table-cell">{r.data.company}</td>
                              <td className="px-2 py-1 border-b border-border hidden sm:table-cell">{r.data.vendortype||r.data.vendorType}</td>
                              <td className="px-2 py-1 border-b border-border">{r.valid?<span className="text-success">✓</span>:<span className="text-danger">{r.errors.join(', ')}</span>}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="flex justify-end gap-2 pt-2">
                      <button onClick={()=>setStep('upload')} className="px-3 h-7 text-xs border border-border rounded hover:bg-hover-bg">Back</button>
                      <button onClick={handleImport} disabled={validCount===0} className="px-3 h-7 text-xs bg-accent text-white rounded hover:bg-blue-700 disabled:opacity-50">Import {validCount} Vendors</button>
                    </div>
                  </div>
                )}
                {step==='importing'&&(
                  <div className="text-center py-8 space-y-3">
                    <Icon name="loader" size={28} className="animate-spin text-accent mx-auto"/>
                    <p className="text-sm font-medium">Importing...</p>
                    <p className="text-2xs text-muted">{progress} of {rows.filter(r=>r.valid).length}</p>
                    <div className="w-48 mx-auto bg-gray-100 rounded-full h-1.5">
                      <div className="bg-accent h-1.5 rounded-full transition-all" style={{width:`${rows.filter(r=>r.valid).length?(progress/rows.filter(r=>r.valid).length)*100:0}%`}}/>
                    </div>
                  </div>
                )}
                {step==='complete'&&(
                  <div className="text-center py-8 space-y-3">
                    <Icon name="check" size={28} className="text-success mx-auto"/>
                    <p className="text-sm font-medium">Import Complete</p>
                    <p className="text-2xs text-muted">{result?.success} imported{result?.fail?`, ${result.fail} failed`:''}</p>
                    <button onClick={onClose} className="px-4 h-7 text-xs bg-accent text-white rounded hover:bg-blue-700">Done</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // VENDOR CARD
    // ═══════════════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════════════
    // TABLE VIEW
    // ═══════════════════════════════════════════════════════════════════
    function VendorTableView({ vendors, onEdit, onDelete, onToggleFav, canEdit, canDelete, selectedIds, onToggleSelect, onSelectAll, loading }) {
      const [sortCol, setSortCol] = useState('name');
      const [sortDir, setSortDir] = useState('asc');

      const sorted = useMemo(()=>[...vendors].sort((a,b)=>{
        const av=a[sortCol]||'', bv=b[sortCol]||'';
        const cmp=typeof av==='string'?av.localeCompare(bv):0;
        return sortDir==='asc'?cmp:-cmp;
      }),[vendors,sortCol,sortDir]);

      const toggleSort = (col) => { if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc'); else{setSortCol(col);setSortDir('asc');} };
      const allSelected = vendors.length>0&&vendors.every(v=>selectedIds.has(v.id));

      const TH = ({col,label,w}) => (
        <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase tracking-wider bg-gray-50 border-b border-border text-left select-none whitespace-nowrap cursor-pointer hover:text-foreground" style={{width:w}} onClick={()=>toggleSort(col)}>
          <div className="flex items-center gap-0.5">{label}<Icon name="arrowUpDown" size={9} className={sortCol===col?'text-accent':'text-gray-300'}/></div>
        </th>
      );

      if (loading && vendors.length === 0) return (
        <div className="overflow-auto h-full"><table className="w-full text-xs"><tbody>{[...Array(8)].map((_,i)=><SkeletonRow key={i}/>)}</tbody></table></div>
      );
      if (vendors.length === 0) return (
        <div className="flex flex-col items-center justify-center h-full text-muted">
          <Icon name="table" size={28} className="mb-2 text-gray-300"/><p className="text-sm font-medium">No vendors found</p>
        </div>
      );

      return (
        <div className="overflow-auto h-full">
          <table className="w-full text-xs border-collapse">
            <thead>
              <tr>
                <th className="px-2 py-1.5 bg-gray-50 border-b border-border sticky left-0 z-10 w-8">
                  <input type="checkbox" checked={allSelected} onChange={()=>allSelected?onSelectAll([]):onSelectAll(vendors.map(v=>v.id))} className="w-3 h-3 rounded"/>
                </th>
                <TH col="name" label="Name" w="140px"/>
                <TH col="company" label="Company" w="120px"/>
                <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase tracking-wider bg-gray-50 border-b border-border text-left whitespace-nowrap">Type</th>
                <TH col="country" label="Country" w="90px"/>
                <TH col="city" label="City" w="80px"/>
                <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase tracking-wider bg-gray-50 border-b border-border text-left whitespace-nowrap">Contact</th>
                <TH col="areaPerforming" label="Area" w="100px"/>
                <th className="px-2 py-1.5 bg-gray-50 border-b border-border text-left text-2xs font-semibold text-muted uppercase whitespace-nowrap">Actions</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(v=>(
                <tr key={v.id} className={`hover:bg-hover-bg ${selectedIds.has(v.id)?'bg-accent-light':''}`}>
                  <td className="px-2 py-1 border-b border-border sticky left-0 bg-white">
                    <input type="checkbox" checked={selectedIds.has(v.id)} onChange={()=>onToggleSelect(v.id)} className="w-3 h-3 rounded"/>
                  </td>
                  <td className="px-2 py-1 border-b border-border whitespace-nowrap">
                    <div className="flex items-center gap-1">

                  <td className="px-2 py-1 border-b border-border text-muted whitespace-nowrap">{v.city}</td>
                  <td className="px-2 py-1 border-b border-border">
                    <div className="flex items-center gap-1">
                      {v.mobile&&<a href={`tel:${v.mobile}`} className="text-muted hover:text-foreground" title={v.mobile}><Icon name="phone" size={11}/></a>}

    // ═══════════════════════════════════════════════════════════════════
    // PAGINATION BAR
    // ═══════════════════════════════════════════════════════════════════
    function PaginationBar({ total, page, pageSize, onChange }) {
      const totalPages = Math.ceil(total/pageSize);
      if (totalPages <= 1) return null;
      const start = page*pageSize+1;
      const end   = Math.min((page+1)*pageSize, total);
      return (
        <div className="flex items-center justify-between px-3 py-1.5 border-t border-border bg-white flex-shrink-0 flex-wrap gap-2">
          <span className="text-2xs text-muted">Showing {start}–{end} of {total} vendors</span>
          <div className="flex items-center gap-1">
            <button onClick={()=>onChange(0)} disabled={page===0} className="px-1.5 h-6 text-2xs border border-border rounded hover:bg-hover-bg disabled:opacity-40">«</button>
            <button onClick={()=>onChange(page-1)} disabled={page===0} className="px-1.5 h-6 text-2xs border border-border rounded hover:bg-hover-bg disabled:opacity-40 flex items-center"><Icon name="chevronLeft" size={10}/></button>
            <span className="px-2 h-6 flex items-center text-2xs font-medium border border-accent bg-accent-light text-accent rounded">{page+1}/{totalPages}</span>
            <button onClick={()=>onChange(page+1)} disabled={page>=totalPages-1} className="px-1.5 h-6 text-2xs border border-border rounded hover:bg-hover-bg disabled:opacity-40 flex items-center"><Icon name="chevronRight" size={10}/></button>
            <button onClick={()=>onChange(totalPages-1)} disabled={page>=totalPages-1} className="px-1.5 h-6 text-2xs border border-border rounded hover:bg-hover-bg disabled:opacity-40">»</button>
          </div>
        </div>
      );
    }

          await db.collection('app_settings').doc('branding').set({
            appTitle:      form.appTitle      || 'Vendor Management',
            logoUrl:       form.logoUrl       || '',
            faviconUrl:    form.faviconUrl    || '',

                    className="w-full px-2 py-1 text-xs border border-border rounded h-7 focus:ring-1 focus:ring-accent"/>
                  {form.logoUrl&&(
                    <div className="mt-1.5 p-2 border border-border rounded bg-gray-50 flex items-center gap-2">
                      <img src={form.logoUrl} alt="Logo preview" className="h-8 w-auto object-contain" onError={e=>e.target.style.display='none'}/>
                      <span className="text-2xs text-muted">Preview</span>

                <div>
                  <label className="text-2xs font-medium text-muted block mb-0.5">Favicon URL</label>
                  <input type="url" value={form.faviconUrl} onChange={e=>set('faviconUrl',e.target.value)} placeholder="https://example.com/favicon.ico"
                    className="w-full px-2 py-1 text-xs border border-border rounded h-7 focus:ring-1 focus:ring-accent"/>

                <div className="flex justify-end gap-2 pt-1 border-t border-border">
                  <button onClick={onClose} className="px-3 h-7 text-xs border border-border rounded hover:bg-hover-bg">Cancel</button>

    // ═══════════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════════
    function MainApp() {
      const { user, role, onLogout } = useAuth();
      const { toast } = useToast();
      const brandingCtx = useBranding();

      const canEdit   = role === 'admin' || role === 'manager';
      const canDelete = role === 'admin';

      const [vendors, setVendors]               = useState([]);
      const [loading, setLoading]               = useState(true);
      const [searchQuery, setSearchQuery]       = useState('');
      const [view, setView]                     = useState('cards');
      const [sidebarOpen, setSidebarOpen]       = useState(false);
      const [mobileFilterOpen, setMobileFilter] = useState(false);
      const [drawerOpen, setDrawerOpen]         = useState(false);
      const [editingVendor, setEditingVendor]   = useState(null);
      const [importOpen, setImportOpen]         = useState(false);
      const [selectedIds, setSelectedIds]       = useState(new Set());
      const [brandingOpen, setBrandingOpen]     = useState(false);
      const [branding, setBranding]             = useState(brandingCtx);
      const [currentPage, setCurrentPage]       = useState(0);
      const [exportOpen, setExportOpen]         = useState(false);

      const [filters, setFilters] = useState({ vendorType:[], country:'', state:'', city:'', location:'', areaPerforming:'', company:'', isFavorite:null, tags:[] });

      const setFilter = (k, v) => {
        if (k === '_clear') { setFilters({ vendorType:[], country:'', state:'', city:'', location:'', areaPerforming:'', company:'', isFavorite:null, tags:[] }); }
        else { setFilters(f => ({...f,[k]:v})); }
        setCurrentPage(0);
      };

      // Open sidebar by default on desktop
      useEffect(()=>{
        const mq = window.matchMedia('(min-width:640px)');
        setSidebarOpen(mq.matches);
        const h = e => setSidebarOpen(e.matches);
        mq.addEventListener('change',h);
        return ()=>mq.removeEventListener('change',h);
      },[]);

      // Apply branding to DOM
      useEffect(()=>{
        if (branding.appTitle) document.title = branding.appTitle;
        if (branding.faviconUrl) { const l=document.getElementById('favicon-link'); if(l) l.href=branding.faviconUrl; }
      },[branding]);

      // Reset page on search
      useEffect(()=>setCurrentPage(0),[searchQuery]);

      // Firebase fetch — always on
      const fetchVendors = useCallback(async () => {
        setLoading(true);
        try {
          const db = firebase.firestore();
          let q = db.collection('vendors').orderBy('updatedAt','desc');
          if (filters.vendorType.length===1) q=q.where('vendorType','array-contains',filters.vendorType[0]);
          if (filters.country)              q=q.where('country','==',filters.country);
          if (filters.isFavorite===true)    q=q.where('isFavorite','==',true);
          q = q.limit(500);
          const snap = await q.get();
          let docs = snap.docs.map(d=>({id:d.id,...d.data()}));
          if (filters.vendorType.length>1) docs=docs.filter(v=>filters.vendorType.some(t=>(v.vendorType||[]).includes(t)));
          if (filters.state)         docs=docs.filter(v=>v.state===filters.state);
          if (filters.city)          docs=docs.filter(v=>(v.city||'').toLowerCase().includes(filters.city.toLowerCase()));
          if (filters.location)      docs=docs.filter(v=>(v.location||'').toLowerCase().includes(filters.location.toLowerCase()));
          if (filters.areaPerforming)docs=docs.filter(v=>(v.areaPerforming||'').toLowerCase().includes(filters.areaPerforming.toLowerCase()));
          if (filters.company)       docs=docs.filter(v=>(v.company||'').toLowerCase().includes(filters.company.toLowerCase()));
          if (filters.tags.length>0) docs=docs.filter(v=>filters.tags.every(t=>(v.tags||[]).includes(t)));
          setVendors(docs);
        } catch(err) {
          console.error('Fetch error:',err);
          toast('Failed to load vendors: '+err.message,'error');
        } finally { setLoading(false); }
      }, [filters, toast]);

      useEffect(()=>{ fetchVendors(); },[fetchVendors]);

      const filteredVendors = useMemo(()=>{
        if (!searchQuery.trim()) return vendors;
        const q=searchQuery.toLowerCase().trim();
        return vendors.filter(v=>
          (v.name||'').toLowerCase().includes(q)||(v.company||'').toLowerCase().includes(q)||
          (v.email||'').toLowerCase().includes(q)||(v.mobile||'').includes(q)||
          (v.country||'').toLowerCase().includes(q)||(v.city||'').toLowerCase().includes(q)||
          (v.location||'').toLowerCase().includes(q)||(v.areaPerforming||'').toLowerCase().includes(q)
        );
      },[vendors,searchQuery]);

      const paginatedVendors = useMemo(()=>filteredVendors.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE),[filteredVendors,currentPage]);

      // CRUD — Firebase only
      const saveVendor = async (formData, existingId) => {
        const now  = firebase.firestore.FieldValue.serverTimestamp();
        const data = { ...formData, nameLower:(formData.name||'').toLowerCase(), companyLower:(formData.company||'').toLowerCase(), whatsappUrl:whatsappUrl(formData.whatsapp), searchTerms:generateSearchTerms(formData), updatedAt:now, updatedBy:user.uid };
        const db = firebase.firestore();
        if (existingId) { await db.collection('vendors').doc(existingId).update(data); toast('Vendor updated','success'); }
        else { data.createdAt=now; data.createdBy=user.uid; data.attachments=[]; await db.collection('vendors').add(data); toast('Vendor added','success'); }
        fetchVendors();
      };

      const deleteVendor = async (vendor) => {
        if (!window.confirm(`Delete "${vendor.name}"? This cannot be undone.`)) return;
        try { await firebase.firestore().collection('vendors').doc(vendor.id).delete(); toast('Vendor deleted','success'); fetchVendors(); }
        catch(err){ toast('Delete failed: '+err.message,'error'); }
      };

      const toggleFavorite = async (vendor) => {
        try { await firebase.firestore().collection('vendors').doc(vendor.id).update({isFavorite:!vendor.isFavorite,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}); fetchVendors(); }
        catch(err){ toast('Failed: '+err.message,'error'); }
      };

      const batchImport = async (rows) => {
        const now=firebase.firestore.FieldValue.serverTimestamp(), db=firebase.firestore(), batch=db.batch();
        rows.forEach(r=>{
          const types=(r.vendortype||r.vendorType||'').split(',').map(s=>s.trim()).filter(Boolean);
          const tags=(r.tags||'').split(',').map(s=>s.trim()).filter(Boolean);
          const data={name:r.name||'',designation:r.designation||'',company:r.company||'',vendorType:types,country:r.country||'',state:r.state||'',city:r.city||'',location:r.location||'',areaPerforming:r.areaperforming||r.areaPerforming||'',mobile:r.mobile||'',whatsapp:r.whatsapp||'',email:r.email||'',website:r.website||'',gst:r.gst||'',iec:r.iec||'',pan:r.pan||'',tags,notes:r.notes||'',attachments:[],isFavorite:false,nameLower:(r.name||'').toLowerCase(),companyLower:(r.company||'').toLowerCase(),whatsappUrl:whatsappUrl(r.whatsapp||''),searchTerms:generateSearchTerms({...r,vendorType:types,tags}),createdAt:now,updatedAt:now,createdBy:user.uid,updatedBy:user.uid};
          batch.set(db.collection('vendors').doc(),data);
        });
        await batch.commit();
        toast(`Imported ${rows.length} vendors`,'success');
        fetchVendors();
      };

      const handleExport = (scope) => {
        let data = scope==='selected'?filteredVendors.filter(v=>selectedIds.has(v.id)):scope==='filtered'?filteredVendors:vendors;
        if (!data.length){toast('No data to export','error');return;}
        const rows=data.map(v=>{const r={};EXPORT_HEADERS.forEach((h,i)=>{const val=v[EXPORT_KEYS[i]];r[h]=Array.isArray(val)?val.join(', '):String(val||'');});return r;});
        const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,'Vendors');
        XLSX.writeFile(wb,`vendors_${new Date().toISOString().slice(0,10)}.xlsx`);
        toast(`Exported ${data.length} vendors`,'success');
      };

      const toggleSelect = (id) => setSelectedIds(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
      const selectAll    = (ids) => setSelectedIds(new Set(ids));
      const copyField    = (field) => { const v=filteredVendors.filter(v=>selectedIds.has(v.id)).map(v=>v[field]).filter(Boolean).join(', '); copyToClipboard(v); toast(`Copied ${field}`,'success'); };

      const filterCount = [filters.vendorType.length>0,filters.country,filters.state,filters.city,filters.location,filters.areaPerforming,filters.company,filters.isFavorite!==null,filters.tags.length>0].filter(Boolean).length;

      return (
        <BrandingContext.Provider value={branding}>
          <div className="flex flex-col h-screen overflow-hidden">

            {/* ── Header ── */}
            <header className="flex items-center justify-between px-3 py-1.5 border-b border-border flex-shrink-0 bg-white">
              <div className="flex items-center gap-2 min-w-0">
                {branding.logoUrl && <img src={branding.logoUrl} alt="Logo" className="h-6 w-auto object-contain flex-shrink-0"/>}
                <h1 className="text-sm font-bold tracking-tight truncate">{branding.appTitle||'Vendor Management'}</h1>
                <span className="px-1.5 py-0.5 text-2xs font-medium bg-accent-light text-accent rounded hidden sm:inline">{role}</span>
              </div>
              <div className="flex items-center gap-1 flex-shrink-0">
                <span className="text-2xs text-muted hidden md:inline truncate max-w-[160px]">{branding.contactEmail||user?.email}</span>
                {canDelete && (
                  <button onClick={()=>setBrandingOpen(true)} className="p-1.5 rounded hover:bg-hover-bg text-muted hover:text-accent" title="Branding Settings">
                    <Icon name="settings" size={14}/>
                  </button>
                )}
                <button onClick={onLogout} className="p-1.5 rounded hover:bg-hover-bg text-muted hover:text-danger" title="Sign Out">
                  <Icon name="logOut" size={14}/>
                </button>
              </div>
            </header>

            {/* ── Toolbar ── */}
            <div className="flex items-center gap-1.5 px-3 py-1.5 border-b border-border flex-shrink-0 flex-wrap bg-white">
              {/* Mobile filter trigger */}
              <button onClick={()=>setMobileFilter(true)}
                className={`sm:hidden px-2 py-1 text-2xs rounded border flex items-center gap-1 transition-colors ${filterCount>0?'border-accent text-accent bg-accent-light':'border-border text-muted hover:bg-hover-bg'}`}>
                <Icon name="filter" size={11}/> Filters{filterCount>0?` (${filterCount})`:''}
              </button>
              {/* Desktop filter toggle */}
              <button onClick={()=>setSidebarOpen(!sidebarOpen)}
                className={`hidden sm:flex px-2 py-1 text-2xs rounded border items-center gap-1 transition-colors ${filterCount>0?'border-accent text-accent':'border-border text-muted hover:bg-hover-bg'}`}>
                <Icon name="filter" size={11}/> Filters{filterCount>0?` (${filterCount})`:''}
              </button>

              <div className="relative flex-1 min-w-[120px] max-w-md">
                <Icon name="search" size={12} className="absolute left-2 top-1/2 -translate-y-1/2 text-muted"/>
                <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search vendors..."
                  className="w-full pl-7 pr-7 py-1 text-xs border border-border rounded h-7 focus:ring-1 focus:ring-accent"/>
                {searchQuery&&<button onClick={()=>setSearchQuery('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-muted hover:text-foreground"><Icon name="x" size={10}/></button>}
              </div>

              <div className="flex border border-border rounded overflow-hidden">
                <button onClick={()=>setView('cards')} className={`px-2 py-1 text-xs ${view==='cards'?'bg-accent text-white':'bg-white text-muted hover:bg-hover-bg'}`} title="Card View"><Icon name="map" size={12}/></button>
                <button onClick={()=>setView('table')} className={`px-2 py-1 text-xs ${view==='table'?'bg-accent text-white':'bg-white text-muted hover:bg-hover-bg'}`} title="Table View"><Icon name="table" size={12}/></button>
              </div>

              <div className="hidden sm:block w-px h-5 bg-border"/>

              {canEdit&&<button onClick={()=>{setEditingVendor(null);setDrawerOpen(true);}} className="px-2.5 py-1 text-xs bg-accent text-white rounded hover:bg-blue-700 flex items-center gap-1 h-7"><Icon name="plus" size={11}/><span className="hidden sm:inline">Add Vendor</span><span className="sm:hidden">Add</span></button>}
              {canEdit&&<button onClick={()=>setImportOpen(true)} className="hidden sm:flex px-2.5 py-1 text-xs border border-border rounded hover:bg-hover-bg items-center gap-1 h-7"><Icon name="upload" size={11}/> Import</button>}

              <div className="relative">
                <button onClick={()=>setExportOpen(!exportOpen)} className="px-2.5 py-1 text-xs border border-border rounded hover:bg-hover-bg flex items-center gap-1 h-7"><Icon name="download" size={11}/><span className="hidden sm:inline">Export</span></button>
                {exportOpen&&<>
                  <div className="fixed inset-0 z-20" onClick={()=>setExportOpen(false)}/>
                  <div className="absolute right-0 top-full mt-1 z-30 bg-white border border-border rounded shadow-lg min-w-[170px] py-1 fade-in">
                    <button onClick={()=>{handleExport('all');setExportOpen(false);}} className="w-full px-3 py-1.5 text-xs text-left hover:bg-hover-bg">All ({vendors.length})</button>
                    <button onClick={()=>{handleExport('filtered');setExportOpen(false);}} className="w-full px-3 py-1.5 text-xs text-left hover:bg-hover-bg">Filtered ({filteredVendors.length})</button>
                    <button onClick={()=>{handleExport('selected');setExportOpen(false);}} disabled={selectedIds.size===0} className="w-full px-3 py-1.5 text-xs text-left hover:bg-hover-bg disabled:opacity-50">Selected ({selectedIds.size})</button>
                  </div>
                </>}
              </div>
            </div>

            {/* ── Bulk actions ── */}
            {selectedIds.size>0&&(
              <div className="flex items-center gap-1.5 px-3 py-1.5 bg-accent-light border-b border-blue-200 flex-shrink-0 flex-wrap">
                <span className="text-2xs font-medium text-accent">{selectedIds.size} selected</span>
                <button onClick={()=>copyField('email')} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent flex items-center gap-0.5"><Icon name="copy" size={9}/> Emails</button>
                <button onClick={()=>copyField('mobile')} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent flex items-center gap-0.5"><Icon name="copy" size={9}/> Phones</button>
                <button onClick={()=>copyField('whatsapp')} className="hidden sm:flex px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent items-center gap-0.5"><Icon name="copy" size={9}/> WhatsApp</button>
                <div className="flex-1"/>
                <button onClick={()=>setSelectedIds(new Set())} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-muted flex items-center gap-0.5"><Icon name="x" size={9}/> Clear</button>
              </div>
            )}

            <div className="flex flex-1 overflow-hidden">
              {/* ── Desktop sidebar ── */}
              {sidebarOpen&&(
                <aside className="hidden sm:flex w-[200px] border-r border-border flex-shrink-0 flex-col h-full overflow-hidden bg-white">
                  <div className="flex items-center justify-between px-3 py-2 border-b border-border">
                    <span className="text-xs font-semibold">Filters</span>
                    {filterCount>0&&<button onClick={()=>setFilter('_clear')} className="text-2xs text-accent hover:underline">Clear ({filterCount})</button>}
                  </div>
                  <div className="flex-1 overflow-y-auto">
                    <FilterContent filters={filters} setFilter={setFilter}/>
                  </div>
                </aside>
              )}

              {/* ── Content area ── */}
              <div className="flex-1 flex flex-col overflow-hidden">
                {/* Status bar */}
                <div className="flex items-center justify-between px-3 py-1 bg-gray-50 border-b border-border text-2xs text-muted flex-shrink-0">
                  {loading ? (
                    <div className="h-2.5 w-36 bg-gray-200 rounded animate-pulse"/>
                  ) : (
                    <span>
                      {filteredVendors.length>0
                        ? `Showing ${currentPage*PAGE_SIZE+1}–${Math.min((currentPage+1)*PAGE_SIZE,filteredVendors.length)} of ${filteredVendors.length} vendors`
                        : 'No vendors found'}
                    </span>
                  )}
                  <span className="capitalize hidden sm:inline">{view} view · Firebase</span>
                </div>

                {/* Vendor list */}
                <div className="flex-1 overflow-auto p-2 sm:p-3">
                  {loading && vendors.length===0 ? (
                    view==='cards' ? (
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-2.5 content-start">
                        {[...Array(9)].map((_,i)=><SkeletonCard key={i}/>)}
                      </div>
                    ) : (
                      <div className="overflow-auto h-full"><table className="w-full text-xs"><tbody>{[...Array(8)].map((_,i)=><SkeletonRow key={i}/>)}</tbody></table></div>
                    )
                  ) : filteredVendors.length===0 ? (
                    <div className="flex flex-col items-center justify-center h-full text-muted">
                      <Icon name="database" size={32} className="mb-2 text-gray-300"/>
                      <p className="text-sm font-medium">No vendors found</p>
                      <p className="text-2xs mt-0.5">Add your first vendor or adjust filters</p>
                      {canEdit&&<button onClick={()=>{setEditingVendor(null);setDrawerOpen(true);}} className="mt-3 px-3 py-1.5 text-xs bg-accent text-white rounded hover:bg-blue-700 flex items-center gap-1"><Icon name="plus" size={11}/> Add Vendor</button>}
                    </div>
                  ) : view==='cards' ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-2.5 content-start">
                      {paginatedVendors.map(v=><VendorCard key={v.id} vendor={v} onEdit={v=>{setEditingVendor(v);setDrawerOpen(true);}} onDelete={deleteVendor} onToggleFav={toggleFavorite} canEdit={canEdit} canDelete={canDelete}/>)}
                    </div>
                  ) : (
                    <VendorTableView vendors={paginatedVendors} onEdit={v=>{setEditingVendor(v);setDrawerOpen(true);}} onDelete={deleteVendor} onToggleFav={toggleFavorite} canEdit={canEdit} canDelete={canDelete} selectedIds={selectedIds} onToggleSelect={toggleSelect} onSelectAll={selectAll} loading={loading}/>
                  )}
                </div>

                <PaginationBar total={filteredVendors.length} page={currentPage} pageSize={PAGE_SIZE} onChange={setCurrentPage}/>
              </div>
            </div>

            {/* ── Drawers / Modals ── */}
            <VendorFormDrawer isOpen={drawerOpen} onClose={()=>{setDrawerOpen(false);setEditingVendor(null);}} editVendor={editingVendor} onSave={saveVendor}/>
            <ImportModal isOpen={importOpen} onClose={()=>setImportOpen(false)} onImport={batchImport}/>
            <MobileFilterSheet isOpen={mobileFilterOpen} onClose={()=>setMobileFilter(false)} filters={filters} setFilter={setFilter} filterCount={filterCount}/>
            {canDelete&&<BrandingSettingsModal isOpen={brandingOpen} onClose={()=>setBrandingOpen(false)} onSaved={b=>setBranding(prev=>({...prev,...b}))}/>}
          </div>
        </BrandingContext.Provider>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // ROOT APP
    // ═══════════════════════════════════════════════════════════════════
    function App({ branding }) {
      const [authState, setAuthState] = useState({ user:null, role:'viewer' });

      const handleLogin  = (user) => setAuthState({ user, role:user.role });
      const handleLogout = ()     => setAuthState({ user:null, role:'viewer' });

      if (!authState.user) {
        return (
          <BrandingContext.Provider value={branding}>
            <ToastProvider>
              <LoginScreen onLogin={handleLogin} branding={branding}/>
            </ToastProvider>
          </BrandingContext.Provider>
        );
      }

      return (
        <AuthContext.Provider value={{ user:authState.user, role:authState.role, onLogout:handleLogout }}>
          <BrandingContext.Provider value={branding}>
            <ToastProvider>
              <MainApp/>
            </ToastProvider>
          </BrandingContext.Provider>
        </AuthContext.Provider>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // BOOT — /api/config → Firebase init → branding → render
    // ═══════════════════════════════════════════════════════════════════
    (async function () {
      // 1. Fetch Firebase config from Vercel serverless function
      let initError = null;
      try {
        const res = await fetch('/api/config');
        if (!res.ok) {
          const body = await res.json().catch(()=>({}));
          throw new Error(`/api/config returned ${res.status}: ${body.error||'Unknown error'}`);
        }
        const config = await res.json();
        if (firebase.apps.length === 0) firebase.initializeApp(config);
      } catch(err) {
        initError = err.message;
        console.error('Firebase init failed:', err);
      }

      if (initError) {
        ReactDOM.createRoot(document.getElementById('root')).render(<ErrorScreen error={initError}/>);
        return;
      }

      // 2. Load branding from Firestore (non-fatal)
      let branding = { appTitle:'Vendor Management', logoUrl:'', faviconUrl:'', contactEmail:'' };
      try {
        const snap = await firebase.firestore().collection('app_settings').doc('branding').get();
        if (snap.exists) {
          const d = snap.data();
          branding = { appTitle:d.appTitle||branding.appTitle, logoUrl:d.logoUrl||'', faviconUrl:d.faviconUrl||'', contactEmail:d.contactEmail||'' };
        }
      } catch(_) { /* use defaults */ }

      // Apply immediately before React paint
      if (branding.appTitle)   document.title = branding.appTitle;
      if (branding.faviconUrl) { const l=document.getElementById('favicon-link'); if(l) l.href=branding.faviconUrl; }

      // 3. Render
      ReactDOM.createRoot(document.getElementById('root')).render(<App branding={branding}/>);
    })();
  </script>
</body>
</html>
