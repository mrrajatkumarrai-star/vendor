    // ═══════════════════════════════════════════════════════════════════

    const FirebaseContext = createContext(null);

    // ═══════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════
    function generateSearchTerms(data) {
      const fields = [data.name, data.company, data.email, data.mobile, data.country, data.state, data.city, data.location, data.areaPerforming, ...(data.vendorType||[]), ...(data.tags||[])];
      const terms = new Set();
      fields.forEach(f => {
        if (!f) return;
        const lower = f.toLowerCase().trim();
        if (lower.length >= 2) terms.add(lower);
        lower.split(/[\s,.\-]+/).forEach(w => { if (w.length >= 2) terms.add(w); });
      });
      // prefix search for name
      if (data.name) {
        const n = data.name.toLowerCase().trim();
        for (let i = 2; i <= Math.min(n.length, 10); i++) terms.add(n.slice(0, i));
      }
      return [...terms].slice(0, 50);
    }

    function getInitials(name) {
      if (!name) return 'VN';
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    function whatsappUrl(num) {
      if (!num) return '';
      return 'https://wa.me/' + num.replace(/\D/g, '');
    }

    function timeAgo(ts) {
      if (!ts) return '—';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const sec = Math.floor((Date.now() - d.getTime()) / 1000);
      if (sec < 60) return 'just now';
      if (sec < 3600) return Math.floor(sec/60) + 'm ago';
      if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
      return Math.floor(sec/86400) + 'd ago';
    }

    function debounce(fn, ms) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    function validateEmail(e) { return !e || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function validatePhone(p) { return !p || /^\+?[\d\s\-]{7,15}$/.test(p); }
    function validateGST(g) { return !g || /^\d{2}[A-Z]{5}\d{4}[A-Z][A-Z\d]Z[A-Z\d]$/.test(g.toUpperCase()); }
    function validatePAN(p) { return !p || /^[A-Z]{5}\d{4}[A-Z]$/.test(p.toUpperCase()); }
    function validateIEC(i) { return !i || /^\d{10}$/.test(i); }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    // TOAST NOTIFICATION
    // ═══════════════════════════════════════════════════════════════════
    const ToastContext = createContext({ toast: () => {} });
    function useToast() { return useContext(ToastContext); }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const toast = useCallback((msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
      }, []);
      return (
        <ToastContext.Provider value={{ toast }}>
          {children}
          <div className="fixed bottom-4 right-4 z-[100] space-y-1.5">
            {toasts.map(t => (
              <div key={t.id} className={`fade-in px-3 py-2 rounded shadow-lg text-xs max-w-xs ${
                t.type === 'error' ? 'bg-red-600 text-white' : t.type === 'success' ? 'bg-green-600 text-white' : 'bg-gray-800 text-white'
              }`}>{t.msg}</div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }



    // ═══════════════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ═══════════════════════════════════════════════════════════════════
    function LoginScreen({ onLogin }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        if (pin === '9965') {
          onLogin({ uid: 'local-admin', email: 'admin@local', displayName: 'Local Admin', role: 'admin' });
        } else {
          setError('Invalid PIN. Please enter correct PIN.');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-white px-4">
          <form onSubmit={handleSubmit} className="w-full max-w-[280px] space-y-4 text-center">
            <div className="mb-2">
              <div className="w-10 h-10 rounded-lg bg-accent-light flex items-center justify-center mx-auto mb-3">
                <Icon name="shield" size={20} className="text-accent" />
              </div>
              <h1 className="text-lg font-bold text-foreground">Vendor Management</h1>
              <p className="text-2xs text-muted mt-0.5">Enter PIN to access the system</p>
            </div>

            {error && (
              <div className="flex items-center gap-1.5 px-2.5 py-1.5 bg-red-50 border border-red-200 rounded text-2xs text-danger justify-center animate-shake">
                <Icon name="alertTriangle" size={12} />
                {error}
              </div>
            )}

            <div>
              <input
                type="password"
                maxLength={6}
                value={pin}
                onChange={e => setPin(e.target.value.replace(/\D/g, ''))}
                placeholder="••••"
                className="w-full text-center tracking-[1em] text-lg font-bold px-3 py-1.5 border border-border rounded focus:ring-1 focus:ring-accent focus:border-accent h-10"
                autoFocus
              />
            </div>

            <button type="submit"
              className="w-full h-8 bg-accent text-white text-xs font-medium rounded hover:bg-blue-700 transition-colors">
              Access System
            </button>
          </form>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // VENDOR FORM (Drawer)
    // ═══════════════════════════════════════════════════════════════════
    function VendorFormDrawer({ isOpen, onClose, editVendor, onSave }) {
      const defaultData = { name:'', designation:'', company:'', vendorType:[], country:'', state:'', city:'', location:'', areaPerforming:'', mobile:'', whatsapp:'', email:'', website:'', gst:'', iec:'', pan:'', tags:[], notes:'', isFavorite: false };
      const [form, setForm] = useState(defaultData);
      const [errors, setErrors] = useState({});
      const [saving, setSaving] = useState(false);
      const [tagInput, setTagInput] = useState('');

      useEffect(() => {
        if (editVendor) {
          setForm({ ...defaultData, ...editVendor, vendorType: editVendor.vendorType || [] });
        } else {
          setForm(defaultData);
        }
        setErrors({});
        setTagInput('');
      }, [editVendor, isOpen]);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const toggleType = (type) => {
        setForm(f => ({
          ...f,
          vendorType: f.vendorType.includes(type) ? f.vendorType.filter(t => t !== type) : [...f.vendorType, type]
        }));
      };

      const addTag = () => {
        const t = tagInput.trim();
        if (t && !form.tags.includes(t)) { set('tags', [...form.tags, t]); setTagInput(''); }
      };

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'Name is required';
        if (form.vendorType.length === 0) e.vendorType = 'Select at least one type';
        if (!validateEmail(form.email)) e.email = 'Invalid email';
        if (!validatePhone(form.mobile)) e.mobile = 'Invalid phone';
        if (!validatePhone(form.whatsapp)) e.whatsapp = 'Invalid number';
        if (!validateGST(form.gst)) e.gst = 'Invalid GST (e.g. 22AAAAA0000A1Z5)';
        if (!validatePAN(form.pan)) e.pan = 'Invalid PAN (e.g. ABCDE1234F)';
        if (!validateIEC(form.iec)) e.iec = 'IEC must be 10 digits';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleSave = async () => {
        if (!validate()) return;
        setSaving(true);
        try {
          await onSave(form, editVendor?.id);
          onClose();
        } catch(err) {
          setErrors({ _form: err.message });
        } finally {
          setSaving(false);
        }
      };

      if (!isOpen) return null;

      const Field = ({ label, field, type = 'text', required, half }) => (
        <div className={half ? 'flex-1' : ''}>
          <label className="text-2xs font-medium text-muted block mb-0.5">{label}{required && ' *'}</label>
          <input type={type} value={form[field]||''} onChange={e => set(field, e.target.value)} placeholder={label}

    // ═══════════════════════════════════════════════════════════════════
    // IMPORT MODAL
    // ═══════════════════════════════════════════════════════════════════
    function ImportModal({ isOpen, onClose, onImport }) {
      const [step, setStep] = useState('upload');
      const [rows, setRows] = useState([]);
      const [progress, setProgress] = useState(0);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      useEffect(() => { if (isOpen) { setStep('upload'); setRows([]); setError(''); setResult(null); } }, [isOpen]);

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const data = await file.arrayBuffer();
          const wb = XLSX.read(data, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
          if (!json.length) { setError('File has no data rows'); return; }
          // Normalize headers and validate
          const validated = json.map((row, i) => {
            const d = {};
            Object.entries(row).forEach(([k, v]) => {
              const keyMap = { 'vendor name':'name', 'vendor_name':'name', 'company name':'company', 'vendor type':'vendorType', 'vendor_type':'vendorType', 'area performing':'areaPerforming', 'area_performing':'areaPerforming', 'mobile number':'mobile', 'whatsapp number':'whatsapp', 'email address':'email', 'gst number':'gst', 'iec number':'iec', 'pan number':'pan' };
              const nk = keyMap[k.toLowerCase().trim()] || k.toLowerCase().trim();
              d[nk] = String(v||'').trim();
            });
            const errors = [];
            if (!d.name) errors.push('Name required');
            if (!d.vendortype && !d.vendorType) errors.push('Type required');
            return { idx: i, data: d, errors, valid: errors.length === 0 };
          });
          setRows(validated);
          setStep('preview');
        } catch(err) { setError('Failed to parse file: ' + err.message); }
      };

      const handleImport = async () => {
        setStep('importing');
        const valid = rows.filter(r => r.valid);
        let success = 0, fail = 0;
        for (let i = 0; i < valid.length; i += BATCH_SIZE) {
          const chunk = valid.slice(i, i + BATCH_SIZE);
          try {
            await onImport(chunk.map(r => r.data));
            success += chunk.length;
          } catch { fail += chunk.length; }
          setProgress(Math.min(i + BATCH_SIZE, valid.length));
        }
        setResult({ success, fail });
        setStep('complete');
      };

      const downloadTemplate = () => {
        const ws = XLSX.utils.aoa_to_sheet([EXPORT_HEADERS, ['John Smith','Manager','ABC Logistics','Freight Forwarding, CHA','India','Maharashtra','Mumbai','Andheri','Western India','+91 98765 43210','+91 98765 43210','john@abc.com','https://abc.com','27AAAAA0000A1Z5','0123456789','ABCDE1234F','freight, import','Key contact']]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Vendors');
        XLSX.writeFile(wb, 'vendor_template.xlsx');
      };

      if (!isOpen) return null;
      const validCount = rows.filter(r => r.valid).length;

      return (
        <>
          <div className="fixed inset-0 bg-black/20 z-40" onClick={onClose} />
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-lg shadow-xl w-full max-w-3xl max-h-[80vh] flex flex-col fade-in">
              <div className="flex items-center justify-between px-4 py-2.5 border-b border-border">
                <h2 className="text-sm font-semibold">Import Vendors</h2>
                <button onClick={onClose} className="p-1 rounded hover:bg-hover-bg text-muted"><Icon name="x" size={16} /></button>
              </div>

              <div className="flex-1 overflow-y-auto p-4">
                {step === 'upload' && (
                  <div className="text-center py-6 space-y-3">
                    <Icon name="fileSpreadsheet" size={36} className="text-muted mx-auto" />
                    <div><p className="text-sm font-medium">Upload Excel or CSV</p><p className="text-2xs text-muted">.csv, .xls, .xlsx</p></div>
                    {error && <p className="text-2xs text-danger">{error}</p>}
                    <div className="flex justify-center gap-2">
                      <label className="cursor-pointer px-3 py-1.5 text-xs bg-accent text-white rounded hover:bg-blue-700 inline-flex items-center gap-1">
                        <Icon name="upload" size={12} /> Choose File
                        <input type="file" accept=".csv,.xls,.xlsx" className="hidden" onChange={handleFile} />
                      </label>
                      <button onClick={downloadTemplate} className="px-3 py-1.5 text-xs border border-border rounded hover:bg-hover-bg inline-flex items-center gap-1">
                        <Icon name="download" size={12} /> Template
                      </button>
                    </div>
                  </div>
                )}

                {step === 'preview' && (
                  <div className="space-y-2">
                    <div className="flex gap-2 text-2xs">
                      <span className="px-1.5 py-0.5 bg-gray-100 rounded">{rows.length} rows</span>
                      <span className="px-1.5 py-0.5 bg-green-50 text-green-700 rounded">{validCount} valid</span>
                      {rows.length - validCount > 0 && <span className="px-1.5 py-0.5 bg-red-50 text-red-700 rounded">{rows.length - validCount} errors</span>}
                    </div>
                    <div className="border border-border rounded overflow-auto max-h-[350px]">
                      <table className="w-full text-2xs">
                        <thead className="sticky top-0 bg-gray-50"><tr>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">#</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">Name</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">Company</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">Type</th>
                          <th className="px-2 py-1 text-left font-semibold text-muted border-b border-border">Status</th>
                        </tr></thead>
                        <tbody>
                          {rows.slice(0, 100).map(r => (
                            <tr key={r.idx} className={r.valid ? '' : 'bg-red-50'}>
                              <td className="px-2 py-1 border-b border-border">{r.idx+1}</td>
                              <td className="px-2 py-1 border-b border-border">{r.data.name}</td>
                              <td className="px-2 py-1 border-b border-border">{r.data.company}</td>
                              <td className="px-2 py-1 border-b border-border">{r.data.vendortype || r.data.vendorType}</td>
                              <td className="px-2 py-1 border-b border-border">{r.valid ? <span className="text-success">✓</span> : <span className="text-danger">{r.errors.join(', ')}</span>}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="flex justify-end gap-2 pt-2">
                      <button onClick={() => setStep('upload')} className="px-3 h-7 text-xs border border-border rounded hover:bg-hover-bg">Back</button>
                      <button onClick={handleImport} disabled={validCount===0} className="px-3 h-7 text-xs bg-accent text-white rounded hover:bg-blue-700 disabled:opacity-50">Import {validCount} Vendors</button>
                    </div>
                  </div>
                )}

                {step === 'importing' && (
                  <div className="text-center py-8 space-y-3">
                    <Icon name="loader" size={28} className="animate-spin text-accent mx-auto" />
                    <p className="text-sm font-medium">Importing...</p>
                    <p className="text-2xs text-muted">{progress} of {rows.filter(r=>r.valid).length}</p>
                    <div className="w-48 mx-auto bg-gray-100 rounded-full h-1.5">
                      <div className="bg-accent h-1.5 rounded-full transition-all" style={{width: `${rows.filter(r=>r.valid).length ? (progress/rows.filter(r=>r.valid).length)*100 : 0}%`}} />
                    </div>
                  </div>
                )}

                {step === 'complete' && (
                  <div className="text-center py-8 space-y-3">
                    <Icon name="check" size={28} className="text-success mx-auto" />
                    <p className="text-sm font-medium">Import Complete</p>
                    <p className="text-2xs text-muted">{result?.success} imported{result?.fail ? `, ${result.fail} failed` : ''}</p>
                    <button onClick={onClose} className="px-4 h-7 text-xs bg-accent text-white rounded hover:bg-blue-700">Done</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // TABLE VIEW
    // ═══════════════════════════════════════════════════════════════════
    function VendorTableView({ vendors, onEdit, onDelete, onToggleFav, canEdit, canDelete, selectedIds, onToggleSelect, onSelectAll, loading }) {
      const [sortCol, setSortCol] = useState('name');
      const [sortDir, setSortDir] = useState('asc');

      const sorted = useMemo(() => {
        return [...vendors].sort((a, b) => {
          const av = a[sortCol] || '';
          const bv = b[sortCol] || '';
          const cmp = typeof av === 'string' ? av.localeCompare(bv) : 0;
          return sortDir === 'asc' ? cmp : -cmp;
        });
      }, [vendors, sortCol, sortDir]);

      const toggleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir('asc'); }
      };

      const allSelected = vendors.length > 0 && vendors.every(v => selectedIds.has(v.id));

      const TH = ({ col, label, w }) => (
        <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase tracking-wider bg-gray-50 border-b border-border text-left select-none whitespace-nowrap cursor-pointer hover:text-foreground" style={{width: w}} onClick={() => toggleSort(col)}>
          <div className="flex items-center gap-0.5">{label} <Icon name="arrowUpDown" size={9} className={sortCol===col ? 'text-accent' : 'text-gray-300'} /></div>
        </th>
      );

      if (loading && vendors.length === 0) return <div className="flex items-center justify-center h-full"><Icon name="loader" size={20} className="animate-spin text-accent" /></div>;
      if (vendors.length === 0) return <div className="flex flex-col items-center justify-center h-full text-muted"><Icon name="table" size={32} className="mb-2 text-gray-300" /><p className="text-sm">No vendors found</p></div>;

      return (
        <div className="h-full flex flex-col">
          <div className="flex-1 overflow-auto">
            <table className="w-full border-collapse min-w-[1000px]">
              <thead className="sticky top-0 z-10">
                <tr>
                  <th className="px-2 py-1.5 bg-gray-50 border-b border-border w-8">
                    <input type="checkbox" checked={allSelected} onChange={() => onSelectAll(allSelected ? [] : vendors.map(v=>v.id))} className="w-3 h-3 rounded" />
                  </th>
                  <TH col="name" label="Vendor" w={180} />
                  <TH col="company" label="Company" w={130} />
                  <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase bg-gray-50 border-b border-border text-left" style={{width:140}}>Type</th>
                  <TH col="location" label="Location" w={130} />
                  <TH col="country" label="Country" w={90} />
                  <TH col="mobile" label="Phone" w={110} />
                  <TH col="email" label="Email" w={160} />
                  <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase bg-gray-50 border-b border-border text-left w-16">WA</th>
                  <TH col="updatedAt" label="Updated" w={80} />
                  <th className="px-2 py-1.5 text-2xs font-semibold text-muted uppercase bg-gray-50 border-b border-border text-left w-16">Actions</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map(v => (
                  <tr key={v.id} className={`hover:bg-hover-bg transition-colors ${selectedIds.has(v.id) ? 'bg-accent-light' : ''}`}>
                    <td className="px-2 py-1.5 border-b border-border"><input type="checkbox" checked={selectedIds.has(v.id)} onChange={() => onToggleSelect(v.id)} className="w-3 h-3 rounded" /></td>
                    <td className="px-2 py-1.5 border-b border-border">
                      <div className="flex items-center gap-1.5">
                        <div className="w-5 h-5 rounded-full bg-accent-light text-accent flex items-center justify-center text-2xs font-bold flex-shrink-0">{getInitials(v.name)}</div>
                        <div className="min-w-0"><div className="text-xs font-medium truncate">{v.name}</div>{v.designation && <div className="text-2xs text-muted truncate">{v.designation}</div>}</div>
                      </div>
                    </td>
                    <td className="px-2 py-1.5 border-b border-border text-xs truncate">{v.company || '—'}</td>
                    <td className="px-2 py-1.5 border-b border-border"><div className="flex flex-wrap gap-0.5">{(v.vendorType||[]).map(t => <span key={t} className={`px-1 py-0 text-2xs rounded ${VENDOR_TYPE_COLORS[t]||'bg-gray-100'}`}>{t}</span>)}</div></td>
                    <td className="px-2 py-1.5 border-b border-border text-xs truncate">{[v.location, v.city].filter(Boolean).join(', ')||'—'}</td>
                    <td className="px-2 py-1.5 border-b border-border text-xs truncate">{v.country||'—'}</td>
                    <td className="px-2 py-1.5 border-b border-border text-xs">{v.mobile ? <a href={`tel:${v.mobile}`} className="text-accent hover:underline">{v.mobile}</a> : '—'}</td>
                    <td className="px-2 py-1.5 border-b border-border text-xs truncate">{v.email ? <a href={`mailto:${v.email}`} className="text-accent hover:underline">{v.email}</a> : '—'}</td>
                    <td className="px-2 py-1.5 border-b border-border">{v.whatsapp ? <a href={whatsappUrl(v.whatsapp)} target="_blank" className="text-green-600"><Icon name="messageCircle" size={12} /></a> : '—'}</td>

                    <td className="px-2 py-1.5 border-b border-border">
                      <div className="flex items-center gap-0.5">
                        <button onClick={() => onToggleFav(v)} className={v.isFavorite ? 'text-amber-500' : 'text-gray-300 hover:text-amber-400'}><Icon name="star" size={11} className={v.isFavorite?'fill-current':''} /></button>
                        {canEdit && <button onClick={() => onEdit(v)} className="text-muted hover:text-accent"><Icon name="edit" size={11} /></button>}
                        {canDelete && <button onClick={() => onDelete(v)} className="text-muted hover:text-danger"><Icon name="trash" size={11} /></button>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // DATABASE SETTINGS MODAL (Option to configure Firebase)
    // ═══════════════════════════════════════════════════════════════════
    function DatabaseSettingsModal({ isOpen, onClose, onSave }) {
      const [config, setConfig] = useState(() => {
        const saved = localStorage.getItem('vms_firebase_config');
        if (saved) return JSON.parse(saved);
        return { apiKey: '', authDomain: '', projectId: '', storageBucket: '', messagingSenderId: '', appId: '' };
      });
      const [enabled, setEnabled] = useState(() => {
        return localStorage.getItem('vms_firebase_enabled') === 'true';
      });
      const [error, setError] = useState('');
      const [testing, setTesting] = useState(false);

      const fields = [
        { key: 'apiKey', label: 'API Key', placeholder: 'AIzaSy...' },
        { key: 'authDomain', label: 'Auth Domain', placeholder: 'your-project.firebaseapp.com' },
        { key: 'projectId', label: 'Project ID', placeholder: 'your-project-id' },
        { key: 'storageBucket', label: 'Storage Bucket', placeholder: 'your-project.appspot.com' },
        { key: 'messagingSenderId', label: 'Messaging Sender ID', placeholder: '123456789' },
        { key: 'appId', label: 'App ID', placeholder: '1:123456789:web:abc123' },
      ];

      const handlePasteConfig = async () => {
        try {
          const text = await navigator.clipboard.readText();
          const match = text.match(/apiKey\s*:\s*["']([^"']+)["']/);
          if (match) {
            const extract = (key) => { const m = text.match(new RegExp(key + `\\s*:\\s*["']([^"']+)["']`)); return m ? m[1] : ''; };
            setConfig({
              apiKey: extract('apiKey'),
              authDomain: extract('authDomain'),
              projectId: extract('projectId'),
              storageBucket: extract('storageBucket'),
              messagingSenderId: extract('messagingSenderId'),
              appId: extract('appId'),
            });
          }
        } catch (_) {}
      };

      const handleSave = async () => {
        setError('');
        if (enabled) {
          if (!config.apiKey || !config.authDomain || !config.projectId) {
            setError('API Key, Auth Domain, and Project ID are required.');
            return;
          }
          setTesting(true);
          try {
            // Clean up existing app instance before re-initializing
            if (firebase.apps.length > 0) {
              await firebase.app().delete();
            }
            firebase.initializeApp(config);
            const db = firebase.firestore();
            // Test read
            await db.collection('_test_connection').doc('ping').get().catch(() => {});
            
            localStorage.setItem('vms_firebase_config', JSON.stringify(config));
            localStorage.setItem('vms_firebase_enabled', 'true');
            onSave(true);
            onClose();
          } catch (err) {
            setError('Connection failed: ' + (err.message || 'Check credentials'));
            try { if (firebase.apps.length > 0) await firebase.app().delete(); } catch(_) {}
          } finally {
            setTesting(false);
          }
        } else {
          localStorage.setItem('vms_firebase_enabled', 'false');
          onSave(false);
          onClose();
        }
      };

      if (!isOpen) return null;

      return (
        <>
          <div className="fixed inset-0 bg-black/20 z-40" onClick={onClose} />
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-lg shadow-xl w-full max-w-sm flex flex-col fade-in">
              <div className="flex items-center justify-between px-4 py-2.5 border-b border-border">
                <h2 className="text-sm font-semibold">Database Settings</h2>
                <button onClick={onClose} className="p-1 rounded hover:bg-hover-bg text-muted"><Icon name="x" size={16} /></button>
              </div>
              <div className="p-4 space-y-3">
                <div className="flex items-center justify-between p-2 bg-gray-50 rounded border border-border">
                  <div>
                    <span className="text-xs font-semibold text-foreground block">Enable Firebase Sync</span>
                    <span className="text-2xs text-muted">Sync data with your cloud Firestore db</span>
                  </div>
                  <input
                    type="checkbox"
                    checked={enabled}
                    onChange={e => setEnabled(e.target.checked)}
                    className="w-4 h-4 text-accent border-border rounded focus:ring-accent"
                  />
                </div>

                {enabled && (
                  <div className="space-y-2.5">
                    <div className="flex items-center justify-between">
                      <span className="text-2xs font-semibold text-muted uppercase">Firebase Configuration</span>
                      <button onClick={handlePasteConfig} className="text-2xs text-accent hover:underline flex items-center gap-0.5">
                        <Icon name="copy" size={10} /> Paste Config
                      </button>
                    </div>
                    {fields.map(f => (
                      <div key={f.key}>
                        <label className="text-2xs font-medium text-muted block mb-0.5">{f.label}</label>
                        <input
                          type="text"
                          value={config[f.key]}
                          onChange={e => setConfig({...config, [f.key]: e.target.value})}
                          placeholder={f.placeholder}
                          className="w-full px-2 py-1 text-xs border border-border rounded bg-white text-foreground placeholder:text-gray-300 focus:ring-1 focus:ring-accent focus:border-accent h-7"
                        />
                      </div>
                    ))}
                  </div>
                )}

                <div className="flex justify-end gap-2 pt-2 border-t border-border">
                  <button onClick={onClose} className="px-3 h-7 text-xs border border-border rounded hover:bg-hover-bg">Cancel</button>
                  <button onClick={handleSave} disabled={testing} className="px-3 h-7 text-xs bg-accent text-white rounded hover:bg-blue-700 disabled:opacity-50 flex items-center gap-1">
                    {testing && <Icon name="loader" size={10} className="animate-spin" />}
                    Save Config
                  </button>
                </div>
              </div>
            </div>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════════
    function MainApp() {
      const { user, role, onLogout } = useAuth();
      const { toast } = useToast();

      const canEdit = role === 'admin' || role === 'manager';
      const canDelete = role === 'admin';

      // State
      const [vendors, setVendors] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [view, setView] = useState('cards'); // cards | table
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [editingVendor, setEditingVendor] = useState(null);
      const [importOpen, setImportOpen] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [dbModalOpen, setDbModalOpen] = useState(false);
      const [firebaseActive, setFirebaseActive] = useState(() => {
        return firebase.apps.length > 0 && localStorage.getItem('vms_firebase_enabled') === 'true';
      });

      // Filters
      const [filters, setFilters] = useState({ vendorType: [], country: '', state: '', city: '', location: '', areaPerforming: '', company: '', isFavorite: null, tags: [] });

      const setFilter = (k, v) => setFilters(f => ({...f, [k]: v}));

      // Fetch vendors (from Firebase or Local Storage)
      const fetchVendors = useCallback(async () => {
        setLoading(true);
        try {
          const isFirebase = firebase.apps.length > 0 && localStorage.getItem('vms_firebase_enabled') === 'true';
          setFirebaseActive(isFirebase);

          if (isFirebase) {
            const db = firebase.firestore();
            let q = db.collection('vendors').orderBy('updatedAt', 'desc');

            // Server-side filters
            if (filters.vendorType.length === 1) q = q.where('vendorType', 'array-contains', filters.vendorType[0]);
            if (filters.country) q = q.where('country', '==', filters.country);
            if (filters.isFavorite === true) q = q.where('isFavorite', '==', true);

            q = q.limit(500);
            const snap = await q.get();
            let docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // Client-side filters
            if (filters.vendorType.length > 1) docs = docs.filter(v => filters.vendorType.some(t => (v.vendorType||[]).includes(t)));
            if (filters.state) docs = docs.filter(v => v.state === filters.state);
            if (filters.city) docs = docs.filter(v => (v.city||'').toLowerCase().includes(filters.city.toLowerCase()));
            if (filters.location) docs = docs.filter(v => (v.location||'').toLowerCase().includes(filters.location.toLowerCase()));
            if (filters.areaPerforming) docs = docs.filter(v => (v.areaPerforming||'').toLowerCase().includes(filters.areaPerforming.toLowerCase()));
            if (filters.company) docs = docs.filter(v => (v.company||'').toLowerCase().includes(filters.company.toLowerCase()));
            if (filters.tags.length > 0) docs = docs.filter(v => filters.tags.every(t => (v.tags||[]).includes(t)));

            setVendors(docs);
          } else {
            // Local Mode
            let docs = getLocalVendors();
            
            // Client-side filters
            if (filters.vendorType.length > 0) docs = docs.filter(v => filters.vendorType.some(t => (v.vendorType||[]).includes(t)));
            if (filters.country) docs = docs.filter(v => v.country === filters.country);
            if (filters.state) docs = docs.filter(v => v.state === filters.state);
            if (filters.city) docs = docs.filter(v => (v.city||'').toLowerCase().includes(filters.city.toLowerCase()));
            if (filters.location) docs = docs.filter(v => (v.location||'').toLowerCase().includes(filters.location.toLowerCase()));
            if (filters.areaPerforming) docs = docs.filter(v => (v.areaPerforming||'').toLowerCase().includes(filters.areaPerforming.toLowerCase()));
            if (filters.company) docs = docs.filter(v => (v.company||'').toLowerCase().includes(filters.company.toLowerCase()));
            if (filters.isFavorite === true) docs = docs.filter(v => v.isFavorite === true);
            if (filters.tags.length > 0) docs = docs.filter(v => filters.tags.every(t => (v.tags||[]).includes(t)));

            // Sort by updatedAt desc
            docs.sort((a, b) => new Date(b.updatedAt).getTime() - new Date(a.updatedAt).getTime());
            setVendors(docs);
          }
        } catch(err) {
          console.error('Fetch error:', err);
          toast('Failed to load vendors: ' + err.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [filters, toast]);

      useEffect(() => { fetchVendors(); }, [fetchVendors]);

      // Debounced search filter (client-side on loaded data)
      const filteredVendors = useMemo(() => {
        if (!searchQuery.trim()) return vendors;
        const q = searchQuery.toLowerCase().trim();
        return vendors.filter(v =>
          (v.name||'').toLowerCase().includes(q) ||
          (v.company||'').toLowerCase().includes(q) ||
          (v.email||'').toLowerCase().includes(q) ||
          (v.mobile||'').includes(q) ||
          (v.country||'').toLowerCase().includes(q) ||
          (v.city||'').toLowerCase().includes(q) ||
          (v.location||'').toLowerCase().includes(q) ||
          (v.areaPerforming||'').toLowerCase().includes(q)
        );
      }, [vendors, searchQuery]);

      // CRUD operations
      const saveVendor = async (formData, existingId) => {
        const searchTerms = generateSearchTerms(formData);
        const waUrl = whatsappUrl(formData.whatsapp);
        const now = firebaseActive ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString();

        const data = {
          ...formData,
          nameLower: formData.name.toLowerCase(),
          companyLower: (formData.company||'').toLowerCase(),
          whatsappUrl: waUrl,
          searchTerms,
          updatedAt: now,
          updatedBy: user.uid,
        };

        try {
          if (firebaseActive) {
            const db = firebase.firestore();
            if (existingId) {
              await db.collection('vendors').doc(existingId).update(data);
              toast('Vendor updated in Firebase', 'success');
            } else {
              data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
              data.createdBy = user.uid;
              data.attachments = [];
              await db.collection('vendors').add(data);
              toast('Vendor created in Firebase', 'success');
            }
          } else {
            // Local Mode
            let localVendors = getLocalVendors();
            if (existingId) {
              localVendors = localVendors.map(v => v.id === existingId ? { ...v, ...data, updatedAt: now } : v);
              toast('Vendor updated locally', 'success');
            } else {
              const newVendor = {
                ...data,
                id: 'vendor-' + Date.now(),
                createdAt: now,
                createdBy: user.uid,
                attachments: [],
              };
              localVendors.push(newVendor);
              toast('Vendor created locally', 'success');
            }
            saveLocalVendors(localVendors);
          }
          fetchVendors();
        } catch (err) {
          toast('Save failed: ' + err.message, 'error');
        }
      };

      const deleteVendor = async (vendor) => {
        if (!window.confirm(`Delete "${vendor.name}"? This cannot be undone.`)) return;
        try {
          if (firebaseActive) {
            const db = firebase.firestore();
            await db.collection('vendors').doc(vendor.id).delete();
            toast('Vendor deleted from Firebase', 'success');
          } else {
            let localVendors = getLocalVendors();
            localVendors = localVendors.filter(v => v.id !== vendor.id);
            saveLocalVendors(localVendors);
            toast('Vendor deleted locally', 'success');
          }
          fetchVendors();
        } catch(err) { toast('Delete failed: ' + err.message, 'error'); }
      };

      const toggleFavorite = async (vendor) => {
        try {
          const now = firebaseActive ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString();
          
          if (firebaseActive) {
            const db = firebase.firestore();
            await db.collection('vendors').doc(vendor.id).update({ isFavorite: !vendor.isFavorite, updatedAt: now });
          } else {
            let localVendors = getLocalVendors();
            localVendors = localVendors.map(v => v.id === vendor.id ? { ...v, isFavorite: !v.isFavorite, updatedAt: now } : v);
            saveLocalVendors(localVendors);
          }
          fetchVendors();
        } catch(err) { toast('Failed: ' + err.message, 'error'); }
      };

      const batchImport = async (rows) => {
        const now = firebaseActive ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString();

        try {
          if (firebaseActive) {
            const db = firebase.firestore();
            const batch = db.batch();
            rows.forEach(r => {
              const types = (r.vendortype || r.vendorType || '').split(',').map(s => s.trim()).filter(Boolean);
              const tags = (r.tags || '').split(',').map(s => s.trim()).filter(Boolean);
              const data = {
                name: r.name||'', designation: r.designation||'', company: r.company||'',
                vendorType: types, country: r.country||'', state: r.state||'', city: r.city||'',
                location: r.location||'', areaPerforming: r.areaperforming || r.areaPerforming || '',
                mobile: r.mobile||'', whatsapp: r.whatsapp||'', email: r.email||'', website: r.website||'',
                gst: r.gst||'', iec: r.iec||'', pan: r.pan||'',
                tags, notes: r.notes||'', attachments: [], isFavorite: false,
                nameLower: (r.name||'').toLowerCase(), companyLower: (r.company||'').toLowerCase(),
                whatsappUrl: whatsappUrl(r.whatsapp||''),
                searchTerms: generateSearchTerms({...r, vendorType: types, tags}),
                createdAt: now, updatedAt: now,
                createdBy: user.uid, updatedBy: user.uid,
              };
              batch.set(db.collection('vendors').doc(), data);
            });
            await batch.commit();
            toast('Imported to Firebase successfully', 'success');
          } else {
            let localVendors = getLocalVendors();
            rows.forEach((r, idx) => {
              const types = (r.vendortype || r.vendorType || '').split(',').map(s => s.trim()).filter(Boolean);
              const tags = (r.tags || '').split(',').map(s => s.trim()).filter(Boolean);
              const data = {
                id: 'vendor-' + Date.now() + '-' + idx,
                name: r.name||'', designation: r.designation||'', company: r.company||'',
                vendorType: types, country: r.country||'', state: r.state||'', city: r.city||'',
                location: r.location||'', areaPerforming: r.areaperforming || r.areaPerforming || '',
                mobile: r.mobile||'', whatsapp: r.whatsapp||'', email: r.email||'', website: r.website||'',
                gst: r.gst||'', iec: r.iec||'', pan: r.pan||'',
                tags, notes: r.notes||'', attachments: [], isFavorite: false,
                nameLower: (r.name||'').toLowerCase(), companyLower: (r.company||'').toLowerCase(),
                whatsappUrl: whatsappUrl(r.whatsapp||''),
                searchTerms: generateSearchTerms({...r, vendorType: types, tags}),
                createdAt: now, updatedAt: now,
                createdBy: user.uid, updatedBy: user.uid,
              };
              localVendors.push(data);
            });
            saveLocalVendors(localVendors);
            toast(`Imported ${rows.length} vendors locally`, 'success');
          }
          fetchVendors();
        } catch (err) {
          toast('Import failed: ' + err.message, 'error');
        }
      };

      // Export
      const handleExport = (scope) => {
        let data;
        if (scope === 'selected') data = filteredVendors.filter(v => selectedIds.has(v.id));
        else if (scope === 'filtered') data = filteredVendors;
        else data = vendors;

        if (data.length === 0) { toast('No data to export', 'error'); return; }

        const rows = data.map(v => {
          const row = {};
          EXPORT_HEADERS.forEach((h, i) => {
            const val = v[EXPORT_KEYS[i]];
            row[h] = Array.isArray(val) ? val.join(', ') : String(val||'');
          });
          return row;
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Vendors');
        XLSX.writeFile(wb, `vendors_${new Date().toISOString().slice(0,10)}.xlsx`);
        toast(`Exported ${data.length} vendors`, 'success');
      };

      // Selection
      const toggleSelect = (id) => setSelectedIds(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const selectAll = (ids) => setSelectedIds(new Set(ids));

      // Copy selected
      const copySelectedField = (field) => {
        const values = filteredVendors.filter(v => selectedIds.has(v.id)).map(v => v[field]).filter(Boolean).join(', ');
        copyToClipboard(values);
        toast(`Copied ${field}`, 'success');
      };

      const handleLogout = () => { onLogout(); };

      const filterCount = [filters.vendorType.length > 0, filters.country, filters.state, filters.city, filters.location, filters.areaPerforming, filters.company, filters.isFavorite !== null, filters.tags.length > 0].filter(Boolean).length;

      const [exportOpen, setExportOpen] = useState(false);
      const [tagFilterInput, setTagFilterInput] = useState('');

      return (
        <div className="flex flex-col h-screen overflow-hidden">
          {/* Top Bar */}
          <header className="flex items-center justify-between px-3 py-1.5 border-b border-border flex-shrink-0">
            <div className="flex items-center gap-2">
              <h1 className="text-sm font-bold tracking-tight">Vendor Management</h1>
              <span className="px-1.5 py-0.5 text-2xs font-medium bg-accent-light text-accent rounded">{role}</span>
            </div>
            <div className="flex items-center gap-1.5">
              {/* Connection Status & Trigger Settings */}
              <button
                onClick={() => setDbModalOpen(true)}
                className={`px-2 py-0.5 text-2xs font-medium rounded border flex items-center gap-1 transition-colors ${
                  firebaseActive ? 'bg-green-50 border-green-200 text-green-700 hover:bg-green-100' : 'bg-gray-50 border-border text-muted hover:bg-hover-bg'
                }`}
                title="Change Database Connection"
              >
                <span className={`w-1.5 h-1.5 rounded-full ${firebaseActive ? 'bg-green-500 animate-pulse' : 'bg-gray-400'}`} />
                {firebaseActive ? 'Firebase Sync' : 'Local Storage'}
              </button>

              <span className="text-2xs text-muted mr-1">{user?.email}</span>
              <button onClick={handleLogout} className="p-1 rounded hover:bg-hover-bg text-muted hover:text-danger" title="Sign Out">
                <Icon name="logOut" size={14} />
              </button>
            </div>
          </header>

          {/* Toolbar */}
          <div className="flex items-center gap-2 px-3 py-1.5 border-b border-border flex-shrink-0">
            <button onClick={() => setSidebarOpen(!sidebarOpen)} className={`px-2 py-1 text-2xs rounded border transition-colors flex items-center gap-1 ${filterCount > 0 ? 'border-accent text-accent' : 'border-border text-muted hover:bg-hover-bg'}`}>
              <Icon name="filter" size={11} /> Filters{filterCount > 0 ? ` (${filterCount})` : ''}
            </button>

            <div className="relative flex-1 max-w-md">
              <Icon name="search" size={12} className="absolute left-2 top-1/2 -translate-y-1/2 text-muted" />
              <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search vendors..."
                className="w-full pl-7 pr-7 py-1 text-xs border border-border rounded h-7 focus:ring-1 focus:ring-accent focus:border-accent" />
              {searchQuery && <button onClick={() => setSearchQuery('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-muted hover:text-foreground"><Icon name="x" size={10} /></button>}
            </div>

            <div className="flex border border-border rounded overflow-hidden">
              <button onClick={() => setView('cards')} className={`px-2 py-1 text-xs ${view==='cards' ? 'bg-accent text-white' : 'bg-white text-muted hover:bg-hover-bg'}`} title="Card View"><Icon name="map" size={12} /></button>
              <button onClick={() => setView('table')} className={`px-2 py-1 text-xs ${view==='table' ? 'bg-accent text-white' : 'bg-white text-muted hover:bg-hover-bg'}`} title="Table View"><Icon name="table" size={12} /></button>
            </div>

            <div className="w-px h-5 bg-border" />

            {canEdit && <button onClick={() => { setEditingVendor(null); setDrawerOpen(true); }} className="px-2.5 py-1 text-xs bg-accent text-white rounded hover:bg-blue-700 flex items-center gap-1 h-7"><Icon name="plus" size={11} /> Add Vendor</button>}
            {canEdit && <button onClick={() => setImportOpen(true)} className="px-2.5 py-1 text-xs border border-border rounded hover:bg-hover-bg flex items-center gap-1 h-7"><Icon name="upload" size={11} /> Import</button>}

            <div className="relative">
              <button onClick={() => setExportOpen(!exportOpen)} className="px-2.5 py-1 text-xs border border-border rounded hover:bg-hover-bg flex items-center gap-1 h-7"><Icon name="download" size={11} /> Export</button>
              {exportOpen && <>
                <div className="fixed inset-0 z-20" onClick={() => setExportOpen(false)} />
                <div className="absolute right-0 top-full mt-1 z-30 bg-white border border-border rounded shadow-lg min-w-[170px] py-1 fade-in">
                  <button onClick={() => { handleExport('all'); setExportOpen(false); }} className="w-full px-3 py-1.5 text-xs text-left hover:bg-hover-bg">All Vendors ({vendors.length})</button>
                  <button onClick={() => { handleExport('filtered'); setExportOpen(false); }} className="w-full px-3 py-1.5 text-xs text-left hover:bg-hover-bg">Filtered ({filteredVendors.length})</button>
                  <button onClick={() => { handleExport('selected'); setExportOpen(false); }} disabled={selectedIds.size===0} className="w-full px-3 py-1.5 text-xs text-left hover:bg-hover-bg disabled:opacity-50">Selected ({selectedIds.size})</button>
                </div>
              </>}
            </div>
          </div>

          {/* Bulk actions */}
          {selectedIds.size > 0 && (
            <div className="flex items-center gap-1.5 px-3 py-1.5 bg-accent-light border-b border-blue-200 flex-shrink-0">
              <span className="text-2xs font-medium text-accent mr-1">{selectedIds.size} selected</span>
              <button onClick={() => copySelectedField('email')} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent flex items-center gap-0.5"><Icon name="copy" size={9} /> Emails</button>
              <button onClick={() => copySelectedField('mobile')} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent flex items-center gap-0.5"><Icon name="copy" size={9} /> Phones</button>
              <button onClick={() => copySelectedField('whatsapp')} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent flex items-center gap-0.5"><Icon name="copy" size={9} /> WhatsApp</button>
              <button onClick={() => copySelectedField('company')} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-accent flex items-center gap-0.5"><Icon name="copy" size={9} /> Companies</button>
              <div className="flex-1" />
              <button onClick={() => setSelectedIds(new Set())} className="px-2 py-0.5 text-2xs rounded hover:bg-blue-100 text-muted flex items-center gap-0.5"><Icon name="x" size={9} /> Clear</button>
            </div>
          )}

          <div className="flex flex-1 overflow-hidden">
            {/* Sidebar */}
            {sidebarOpen && (
              <aside className="w-[210px] border-r border-border flex-shrink-0 flex flex-col h-full overflow-hidden bg-white">
                <div className="flex items-center justify-between px-3 py-2 border-b border-border">
                  <span className="text-xs font-semibold">Filters</span>
                  {filterCount > 0 && <button onClick={() => setFilters({ vendorType:[], country:'', state:'', city:'', location:'', areaPerforming:'', company:'', isFavorite:null, tags:[] })} className="text-2xs text-accent hover:underline">Clear ({filterCount})</button>}
                </div>
                <div className="flex-1 overflow-y-auto px-3 py-2 space-y-3">
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Vendor Type</div>
                    {VENDOR_TYPES.map(t => (
                      <label key={t} className="flex items-center gap-1.5 py-0.5 text-xs cursor-pointer hover:text-accent">
                        <input type="checkbox" checked={filters.vendorType.includes(t)} onChange={() => setFilter('vendorType', filters.vendorType.includes(t) ? filters.vendorType.filter(x=>x!==t) : [...filters.vendorType, t])} className="w-3 h-3 rounded" />
                        <span className={filters.vendorType.includes(t) ? 'font-medium text-foreground' : 'text-muted'}>{t}</span>
                      </label>
                    ))}
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Country</div>
                    <select value={filters.country} onChange={e => setFilter('country', e.target.value)} className="w-full px-2 py-1 text-xs border border-border rounded h-7 appearance-none bg-white">
                      <option value="">All</option>{COUNTRIES.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">State</div>
                    <select value={filters.state} onChange={e => setFilter('state', e.target.value)} className="w-full px-2 py-1 text-xs border border-border rounded h-7 appearance-none bg-white">
                      <option value="">All</option>{INDIAN_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">City</div>
                    <input value={filters.city} onChange={e => setFilter('city', e.target.value)} placeholder="City" className="w-full px-2 py-1 text-xs border border-border rounded h-7" />
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Location</div>
                    <input value={filters.location} onChange={e => setFilter('location', e.target.value)} placeholder="Location" className="w-full px-2 py-1 text-xs border border-border rounded h-7" />
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Area</div>
                    <input value={filters.areaPerforming} onChange={e => setFilter('areaPerforming', e.target.value)} placeholder="Area" className="w-full px-2 py-1 text-xs border border-border rounded h-7" />
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Company</div>
                    <input value={filters.company} onChange={e => setFilter('company', e.target.value)} placeholder="Company" className="w-full px-2 py-1 text-xs border border-border rounded h-7" />
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Tags</div>
                    <input value={tagFilterInput} onChange={e => setTagFilterInput(e.target.value)} onKeyDown={e => { if (e.key==='Enter') { e.preventDefault(); const t=tagFilterInput.trim(); if(t && !filters.tags.includes(t)) setFilter('tags',[...filters.tags, t]); setTagFilterInput(''); }}} placeholder="Add tag" className="w-full px-2 py-1 text-xs border border-border rounded h-7" />
                    {filters.tags.length > 0 && <div className="flex flex-wrap gap-1 mt-1">{filters.tags.map(t => <span key={t} className="inline-flex items-center gap-0.5 px-1.5 py-0.5 text-2xs bg-accent-light text-accent rounded">{t}<button onClick={() => setFilter('tags', filters.tags.filter(x=>x!==t))}><Icon name="x" size={8} /></button></span>)}</div>}
                  </div>
                  <div><div className="text-2xs font-semibold text-muted uppercase mb-1">Favorites</div>
                    <button onClick={() => setFilter('isFavorite', filters.isFavorite===true ? null : true)}
                      className={`flex items-center gap-1 px-2 py-1 text-xs rounded border ${filters.isFavorite===true ? 'bg-amber-50 border-amber-200 text-amber-700' : 'bg-white border-border text-muted hover:bg-hover-bg'}`}>
                      <Icon name="star" size={11} className={filters.isFavorite===true ? 'fill-current' : ''} /> Favorites Only
                    </button>
                  </div>
                </div>
              </aside>
            )}

            {/* Main content */}
            <div className="flex-1 flex flex-col overflow-hidden">
              <div className="flex items-center justify-between px-3 py-1 bg-gray-50 border-b border-border text-2xs text-muted flex-shrink-0">
                <span>Showing {filteredVendors.length} of {vendors.length} vendors</span>
                <span className="capitalize">{view} view</span>
              </div>

              <div className="flex-1 overflow-auto p-3">
                {loading && vendors.length === 0 ? (
                  <div className="flex items-center justify-center h-full"><Icon name="loader" size={24} className="animate-spin text-accent" /></div>
                ) : filteredVendors.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-muted">
                    <Icon name="database" size={32} className="mb-2 text-gray-300" />
                    <p className="text-sm font-medium">No vendors found</p>
                    <p className="text-2xs mt-0.5">Add your first vendor or adjust filters</p>
                    {canEdit && <button onClick={() => { setEditingVendor(null); setDrawerOpen(true); }} className="mt-3 px-3 py-1.5 text-xs bg-accent text-white rounded hover:bg-blue-700 flex items-center gap-1"><Icon name="plus" size={11} /> Add Vendor</button>}
                  </div>
                ) : view === 'cards' ? (
                  <div className="flex flex-wrap gap-2.5 content-start">
                    {filteredVendors.map(v => <VendorCard key={v.id} vendor={v} onEdit={v => { setEditingVendor(v); setDrawerOpen(true); }} onDelete={deleteVendor} onToggleFav={toggleFavorite} canEdit={canEdit} canDelete={canDelete} />)}
                  </div>
                ) : (
                  <VendorTableView vendors={filteredVendors} onEdit={v => { setEditingVendor(v); setDrawerOpen(true); }} onDelete={deleteVendor} onToggleFav={toggleFavorite} canEdit={canEdit} canDelete={canDelete} selectedIds={selectedIds} onToggleSelect={toggleSelect} onSelectAll={selectAll} loading={loading} />
                )}
              </div>
            </div>
          </div>

          {/* Drawers & Modals */}
          <VendorFormDrawer isOpen={drawerOpen} onClose={() => { setDrawerOpen(false); setEditingVendor(null); }} editVendor={editingVendor} onSave={saveVendor} />
          <ImportModal isOpen={importOpen} onClose={() => setImportOpen(false)} onImport={batchImport} />
          <DatabaseSettingsModal isOpen={dbModalOpen} onClose={() => setDbModalOpen(false)} onSave={(enabled) => { setFirebaseActive(enabled); fetchVendors(); }} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // ROOT APP
    // ═══════════════════════════════════════════════════════════════════
    function App() {
      const [authState, setAuthState] = useState(() => {
        const saved = localStorage.getItem('vms_session_user');
        if (saved) {
          try {
            return { user: JSON.parse(saved), role: 'admin', loading: false };
          } catch (_) {}
        }
        return { user: null, role: 'viewer', loading: false };
      });

      const handleLogin = (user) => {
        localStorage.setItem('vms_session_user', JSON.stringify(user));
        setAuthState({ user, role: user.role, loading: false });
      };

      const handleLogout = () => {
        localStorage.removeItem('vms_session_user');
        setAuthState({ user: null, role: 'viewer', loading: false });
      };

      if (authState.loading) {
        return <div className="flex items-center justify-center h-screen"><Icon name="loader" size={24} className="animate-spin text-accent" /><span className="ml-2 text-xs text-muted">Loading...</span></div>;
      }

      if (!authState.user) {
        return <ToastProvider><LoginScreen onLogin={handleLogin} /></ToastProvider>;
      }

      // ── Firebase config (loaded securely from /api/config at runtime) ─────
      // Keys are stored in Vercel Environment Variables — never in source code.
      const FIREBASE_CONFIG = window._fbConfig || null;

      // Auto-initialize Firebase using the securely fetched config
      if (FIREBASE_CONFIG && firebase.apps.length === 0) {
        try {
          firebase.initializeApp(FIREBASE_CONFIG);
          localStorage.setItem('vms_firebase_config', JSON.stringify(FIREBASE_CONFIG));
          localStorage.setItem('vms_firebase_enabled', 'true');
        } catch (e) {
          console.error('Firebase init failed:', e);
        }
      }

      return (
        <AuthContext.Provider value={{ user: authState.user, role: authState.role, onLogout: handleLogout }}>
          <ToastProvider>
            <MainApp />
          </ToastProvider>
        </AuthContext.Provider>
      );
    }

    // ─── Mount (async — fetches Firebase config securely before render) ─────
    (async function () {
      try {
        const res = await fetch('/api/config');
        if (res.ok) {
          window._fbConfig = await res.json();
        } else {
          console.warn('Firebase config API error:', res.status, '— running in local-only mode.');
        }
      } catch (e) {
        console.warn('Could not reach /api/config — running in local-only mode.', e);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    })();
  </script>
</body>
</html>
